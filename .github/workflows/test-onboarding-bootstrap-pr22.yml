name: Test onboarding with bootstrap PR 22

on:
  workflow_dispatch:
    inputs:
      spec_url:
        description: Optional HTTPS OpenAPI URL. Empty uses this repo's dummy spec at the current commit.
        required: false
        default: ""

jobs:
  onboarding:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    env:
      BOOTSTRAP_REF: 43d3899c7cbc988af95a207945483562fa3fb427
      DEFAULT_SPEC_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/openapi/dummy-openapi.yaml
    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Checkout onboarding action
        uses: actions/checkout@v4
        with:
          repository: postman-cs/postman-api-onboarding-action
          ref: main
          path: .github/actions/postman-api-onboarding-action

      - name: Exclude local action checkout from repo sync commits
        run: echo ".github/actions/postman-api-onboarding-action/" >> .git/info/exclude

      - name: Point onboarding at bootstrap PR 22
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const actionPath = '.github/actions/postman-api-onboarding-action/action.yml';
          const bootstrapRef = process.env.BOOTSTRAP_REF;
          const before = 'postman-cs/postman-bootstrap-action@main';
          const after = `postman-cs/postman-bootstrap-action@${bootstrapRef}`;
          const source = fs.readFileSync(actionPath, 'utf8');
          if (!source.includes(before)) {
            throw new Error(`Could not find ${before} in ${actionPath}`);
          }
          fs.writeFileSync(actionPath, source.replace(before, after));
          console.log(`Using ${after}`);
          NODE

      - id: onboarding
        name: Run onboarding flow
        uses: ./.github/actions/postman-api-onboarding-action
        with:
          project-name: pr-merge-test-pr22-${{ github.run_id }}
          spec-url: ${{ inputs.spec_url != '' && inputs.spec_url || env.DEFAULT_SPEC_URL }}
          spec-path: openapi/dummy-openapi.yaml
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-fallback-token: ${{ secrets.GH_FALLBACK_TOKEN }}
          repo-write-mode: commit-only
          generate-ci-workflow: "false"
          environments-json: '["prod"]'
          env-runtime-urls-json: '{"prod":"https://api.example.com"}'

      - name: Print onboarding outputs
        if: always()
        run: |
          echo "bootstrap-outcome=${{ steps.onboarding.outputs.bootstrap-outcome }}"
          echo "repo-sync-outcome=${{ steps.onboarding.outputs.repo-sync-outcome }}"
          echo "workspace-id=${{ steps.onboarding.outputs.workspace-id }}"
          echo "spec-id=${{ steps.onboarding.outputs.spec-id }}"
          echo "commit-sha=${{ steps.onboarding.outputs.commit-sha }}"
          git status --short

      - name: Upload generated Postman artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-artifacts-bootstrap-pr22
          path: |
            .postman/
            postman/
          if-no-files-found: ignore
