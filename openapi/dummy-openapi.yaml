openapi: 3.1.0
info:
  title: PR Merge Test API
  version: 1.0.0
  description: Minimal OpenAPI document for testing Postman onboarding action wiring.
servers:
  - url: https://api.example.com
paths:
  /health:
    get:
      operationId: getHealth
      summary: Get service health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok
  /orders:
    post:
      operationId: createOrder
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sku
                - quantity
              properties:
                sku:
                  type: string
                  example: ABC-123
                quantity:
                  type: integer
                  minimum: 1
                  example: 2
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: string
                    example: ord_123
