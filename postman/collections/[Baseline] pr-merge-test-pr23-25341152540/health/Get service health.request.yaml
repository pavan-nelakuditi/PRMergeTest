type: http
name: Get service health
url: '{{baseUrl}}/health'
method: GET
headers:
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "status": "ok"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Service is healthy
